name: CI

on:
  push:
    branches: [main, feature/*, fix/*, refactor/*]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend Lint & Type Check ──────────────────────────────
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev tools
        run: pip install ruff mypy

      - name: Ruff check
        run: ruff check src/ tests/ --exit-zero || true

      - name: Ruff format check
        run: ruff format --check src/ tests/ || true

      - name: Mypy type check
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

  # ── Backend Unit Tests ─────────────────────────────────────
  backend-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: |
          uv run pytest tests/ \
            -q --tb=short \
            --ignore=tests/test_realtime_kline.py \
            --ignore=tests/test_realtime_minute.py \
            --ignore=tests/test_realtime_minute_integration.py \
            --ignore=tests/test_extractor.py \
            --ignore=tests/test_http_service.py \
            --ignore=tests/test_schemas.py \
            --ignore=tests/test_screener.py \
            || true

  # ── Frontend Build Check ───────────────────────────────────
  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx vue-tsc --noEmit || true

      - name: Vite build
        run: npx vite build

  # ── Security Scan ──────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit --desc || true

      - name: npm audit
        run: |
          cd frontend
          npm audit --audit-level=high || true

  # ── Docker Build Verify ────────────────────────────────────
  docker-verify:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image (production)
        run: docker build -f docker/Dockerfile.backend --target production -t stock-backend:verify .

      - name: Build frontend image (production)
        run: docker build -f docker/Dockerfile.frontend --target production -t stock-frontend:verify frontend/
