# docker-compose.dev.yml - Development mode overrides
# Architecture: MCP server is embedded in backend container, no separate stock-mcp container needed.
# Usage: docker compose -f docker-compose.yml -f docker-compose.infra.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: development
    volumes:
      - ./src:/app/src:ro
      - ./logs:/app/logs
      - ./data:/app/data
      - backend-logs:/app/src/stock_datasource/logs
      - backend-data:/app/src/stock_datasource/data
    environment:
      # Enable debug mode
      DEBUG: "true"
      LOG_LEVEL: DEBUG

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      target: development
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    environment:
      NODE_ENV: development

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: development
    volumes:
      - ./src:/app/src:ro
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      DEBUG: "true"
      LOG_LEVEL: DEBUG

volumes:
  backend-logs:
  backend-data:
